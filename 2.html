  <h2>아침에 밥을 먹어야 하는 이유</h2>
  <strong>2. 두뇌 회전이 잘 되고 일의 능률을 높인다</strong>
  <p>우리 뇌는 탄수화물을 에너지로 쓰는데, 아침밥을 먹어야 두뇌 회전에 필요한 식물성 당질을 공급할 수 있다. 아침밥을 먹지 않으면 점심시간까지 10시간 이상 공복 상태로 있게 돼서 당분 부족으로 저혈당 상태가 되고 두뇌 회전이 잘 안 돼 학습이나 일의 능률이 떨어진다. 아침밥을 먹고 다니는 학생과 그렇지 않은 경우를 비교 연구한 결과, 아침을 먹는 학생들의 성적이 훨씬 더 높은 것으로 나타났다.</p>
