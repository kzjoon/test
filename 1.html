    <h2>아침에 밥을 먹어야 하는 이유</h2>
    <strong>1. 잠자고 있던 몸과 뇌를 깨운다</strong>
    <p>
      아침에 눈을 뜨면 신체기능이 활발하게 시작돼야 하는데, 아침밥을 먹지 않으면 잠자던 몸이 깨어나는 데 시간과 에너지가 많이 든다.
      아침밥을 먹으면 신진대사를 자극해 몸을 깨우며 식사 중 안면근육을 움직여 대뇌를 자극하는 데 도움이 된다.
    </p>
