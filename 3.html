  <h2>아침에 밥을 먹어야 하는 이유</h2>
  <strong>3. 컨디션을 좋게 하고 위 건강에 좋다</strong>
  <p>아침밥을 먹지 않으면 뇌는 몸속 지방을 분해해서 포도당을 만들게 되고, 이로 인해 쉽게 피로해지며, 혈당치가 낮아지면서 성질이 급해지고 짜증도 잘 내게 된다. 또한, 아침을 거르면 밤새 분비된 위산 때문에 위 점막이 상해 속쓰림이 나타날 수 있으며, 지속하면 위염이나 위궤양으로 발전할 수 있고, 영양 불균형으로 건강을 해칠 수 있다.</p>
